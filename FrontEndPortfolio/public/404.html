<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | aswinsagar.com</title>
    <meta name="robots" content="noindex,follow" />
    <style>
      :root {
        --bg: #050505;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.65);
        --border: rgba(255, 255, 255, 0.15);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #151515 0%, #050505 55%);
        color: var(--text);
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      }
      .code {
        font-size: clamp(2.2rem, 6vw, 4.5rem);
        line-height: 1;
        margin: 0 0 14px;
        letter-spacing: -0.02em;
      }
      .line {
        margin: 0 0 10px;
        color: var(--muted);
      }
      .hint {
        margin-top: 14px;
        font-size: 0.9rem;
      }
      .actions {
        margin-top: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        color: #fff;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 12px;
        min-width: 150px;
      }
      .btn:hover {
        background: #fff;
        color: #000;
      }
      .ticker {
        margin-top: 14px;
        color: #00ff41;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="code">404_NOT_FOUND</h1>
      <p class="line">The route you asked for is missing from this deployment.</p>
      <p class="line">No panic. Auto-routing you to <strong>aswinsagar.com</strong> in <span id="count">8</span>s.</p>
      <p class="ticker">$ trace --target /home --status recovering...</p>
      <div class="actions">
        <a class="btn" href="/">Go Home</a>
        <a class="btn" href="/#contact">Contact</a>
      </div>
      <p class="hint">Tip: if this was an old deep link, the latest content is on the home page sections.</p>
    </main>
    <script>
      let left = 8;
      const el = document.getElementById("count");
      const id = setInterval(() => {
        left -= 1;
        if (el) el.textContent = String(Math.max(left, 0));
        if (left <= 0) {
          clearInterval(id);
          window.location.replace("/");
        }
      }, 1000);
    </script>
  </body>
</html>
